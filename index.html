<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Busters</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Cookie&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Tajawal',sans-serif;background:#fff0f3;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;margin:0;overflow-x:hidden;position:relative;padding:30px 15px}
        .bubble{position:fixed;border-radius:50%;z-index:-1;filter:blur(60px);opacity:.6;pointer-events:none}
        .b-1{width:350px;height:350px;background:#ffc1cc;top:-80px;left:-80px;animation:mb1 20s ease-in-out infinite}
        .b-2{width:450px;height:450px;background:#ffd6e0;bottom:-120px;right:-120px;animation:mb2 25s ease-in-out infinite}
        .b-3{width:300px;height:300px;background:#ffe4e1;top:50%;left:60%;animation:mb3 18s ease-in-out infinite}
        .b-4{width:200px;height:200px;background:#f8bbd0;bottom:30%;left:10%;animation:mb1 22s infinite reverse}
        @keyframes mb1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,40px) scale(1.05)}}
        @keyframes mb2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,-30px) scale(1.1)}}
        @keyframes mb3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-40px) scale(.95)}}
        .page{position:absolute;width:90%;max-width:580px;transition:all .6s cubic-bezier(.4,0,.2,1)}
        .page.hidden-right{opacity:0;transform:translateX(-80px) scale(.95);pointer-events:none}
        .page.hidden-left{opacity:0;transform:translateX(80px) scale(.95);pointer-events:none}
        .page.active{opacity:1;transform:translateX(0) scale(1);pointer-events:all}
        .card{background:rgba(255,255,255,.65);backdrop-filter:blur(20px);padding:36px;border-radius:30px;border:1px solid rgba(255,255,255,.9);box-shadow:0 15px 35px rgba(233,30,99,.06);animation:floatCard 10s ease-in-out infinite}
        @keyframes floatCard{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        h1{font-family:'Cookie',cursive;color:#d63384;text-align:center;font-size:3.8rem;margin-bottom:0;text-shadow:2px 2px 0 #f8bbd0}
        p.sub{text-align:center;color:#880e4f;margin:10px 0 28px;font-weight:700;font-size:1.05rem;display:flex;justify-content:center;align-items:center;gap:15px;flex-wrap:wrap}
        .y2k-eye{width:45px;height:28px;background:#fff;border:2px solid #e91e63;border-radius:50%;position:relative;display:inline-block;box-shadow:inset 0 -2px 0 #fce4ec}
        .y2k-eye::before{content:'';position:absolute;top:-8px;left:3px;width:26px;height:13px;border-top:2px solid #c2185b;border-left:2px solid #c2185b;border-right:2px solid #c2185b;border-radius:50% 50% 0 0}
        .y2k-pupil{width:16px;height:16px;background:radial-gradient(circle at 30% 30%,#f48fb1,#880e4f);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(233,30,99,.4)}
        .y2k-pupil::after{content:'✦';color:#fff;font-size:8px;position:absolute;top:2px;right:2px}
        .y2k-eyelid{width:100%;height:0%;background:#fce4ec;position:absolute;top:0;left:0;z-index:2;animation:cafewink 6s infinite}
        @keyframes cafewink{0%,88%,100%{height:0%;border-radius:0}93%{height:105%;border-radius:0 0 50% 50%}}
        .form-group{margin-bottom:16px;position:relative}
        .form-group label{display:block;color:#880e4f;font-weight:800;font-size:.88rem;margin-bottom:7px}
        .form-group label .req{color:#e91e63;font-size:1.1rem;margin-right:2px}
        .input-wrap{position:relative}
        .input-wrap .icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:1.1rem;pointer-events:none;opacity:.5}
        .form-group input,.form-group select{width:100%;padding:13px 46px 13px 16px;border:1px solid #f8bbd0;border-radius:18px;font-family:'Tajawal';font-size:15px;outline:none;transition:.3s;background:rgba(255,255,255,.5);color:#880e4f;font-weight:700}
        .form-group select{cursor:pointer;appearance:none;-webkit-appearance:none}
        .form-group input::placeholder{color:#e91e63;opacity:.4;font-weight:400}
        .form-group input:focus,.form-group select:focus{border-color:#e91e63;background:#fff;box-shadow:0 0 0 3px rgba(233,30,99,.1)}
        .form-group input.error{border-color:#c62828;box-shadow:0 0 0 3px rgba(198,40,40,.1);animation:shake .4s ease-in-out}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
        .error-msg{color:#c62828;font-size:.78rem;font-weight:700;margin-top:5px;display:none}
        .error-msg.show{display:block}
        .field-row{display:flex;gap:14px}
        .field-row .form-group{flex:1}
        button.main-btn{width:100%;padding:16px;border:none;border-radius:50px;color:#fff;font-family:'Tajawal';font-size:20px;font-weight:900;cursor:pointer;transition:.2s;background:linear-gradient(45deg,#FF6B9D,#A178DF);box-shadow:0 4px 0 #6a1b9a,0 6px 10px rgba(106,27,154,.2);text-shadow:0 1px 1px rgba(0,0,0,.1);position:relative;overflow:hidden;letter-spacing:1px;margin-top:6px}
        button.main-btn::before{content:'';position:absolute;top:0;left:0;width:100%;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.4),rgba(255,255,255,0));border-radius:50px 50px 0 0}
        button.main-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #6a1b9a}
        button.back-btn{background:none;border:2px solid #f8bbd0;color:#880e4f;padding:10px 24px;border-radius:50px;font-family:'Tajawal';font-weight:800;font-size:.9rem;cursor:pointer;transition:.3s;margin-bottom:16px}
        button.back-btn:hover{border-color:#e91e63;background:rgba(233,30,99,.05)}
        .mode-toggle{display:flex;gap:0;margin-bottom:18px;border-radius:14px;overflow:hidden;border:2px solid #f8bbd0}
        .mode-btn{flex:1;padding:10px 6px;border:none;background:rgba(255,255,255,.4);color:#880e4f;font-family:'Tajawal';font-weight:800;font-size:.82rem;cursor:pointer;transition:.3s}
        .mode-btn.active{background:linear-gradient(45deg,#FF6B9D,#A178DF);color:#fff;box-shadow:0 2px 10px rgba(106,27,154,.2)}
        .dataset-controls{background:rgba(255,255,255,.5);border:1px solid #f8bbd0;border-radius:16px;padding:14px;margin-bottom:18px;display:none}
        .dataset-controls.show{display:block}
        .dataset-controls label{display:block;color:#880e4f;font-weight:800;font-size:.85rem;margin-bottom:6px}
        .dataset-controls select{width:100%;padding:10px 14px;border:1px solid #f8bbd0;border-radius:14px;font-family:'Tajawal';font-size:14px;background:#fff;color:#880e4f;font-weight:700;outline:none;cursor:pointer}
        .dataset-controls select:focus{border-color:#e91e63}
        .dataset-count{text-align:center;color:#c2185b;font-size:.8rem;margin-top:8px;font-weight:700}
        .hint{text-align:left;color:#c2185b;font-size:.8rem;margin-bottom:18px;opacity:.8}
        .star-rating{display:flex;justify-content:center;gap:10px;margin-bottom:8px;direction:ltr}
        .star-rating span{font-size:2.5rem;color:#f8bbd0;cursor:pointer;transition:color .2s,transform .2s;user-select:none}
        .star-rating span:hover,.star-rating span.active{color:#d63384;transform:scale(1.2)}
        .star-rating.disabled span{cursor:default;opacity:.4}
        .star-hint{text-align:center;color:#c2185b;font-size:.8rem;margin-bottom:18px;opacity:.7;min-height:18px}
        textarea{width:100%;padding:15px;border:1px solid #f8bbd0;border-radius:20px;font-family:'Tajawal';font-size:16px;margin-bottom:6px;outline:none;transition:.3s;resize:vertical;background:rgba(255,255,255,.5);min-height:90px}
        textarea:focus{border-color:#e91e63;background:#fff;box-shadow:0 0 0 3px rgba(233,30,99,.1)}
        .field-label{display:block;color:#880e4f;font-weight:800;font-size:.95rem;margin-bottom:8px}
        .review-card{background:linear-gradient(135deg,#fff0f3 0%,#fce4ec 100%);padding:16px;border-radius:20px;border:1px solid #f8bbd0;box-shadow:0 10px 25px rgba(233,30,99,.08);margin-top:14px;animation:slideIn .4s ease-out both}
        @keyframes slideIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
        .review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
        .review-num{background:linear-gradient(45deg,#FF6B9D,#A178DF);color:#fff;padding:4px 14px;border-radius:20px;font-weight:900;font-size:.8rem}
        .review-stars-display{direction:ltr;color:#d63384;font-size:1rem;letter-spacing:2px}
        .review-stars-display .empty{color:#f8bbd0}
        .review-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
        .meta-tag{font-size:.72rem;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.6);color:#ad1457;font-weight:700;border:1px solid #f8bbd0}
        .review-text-preview{color:#ad1457;font-size:.85rem;margin-bottom:10px;padding:10px 14px;background:rgba(255,255,255,.5);border-radius:12px;border-right:3px solid #f48fb1;line-height:1.7;max-height:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .tag{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:30px;margin:3px;font-size:12px;font-weight:800;border:2px solid;box-shadow:0 2px 5px rgba(0,0,0,.03)}
        .pos{color:#2e7d32;background:#f1f8e9;border-color:#a5d6a7}
        .neg{color:#c62828;background:#ffebee;border-color:#ef9a9a}
        .neu{color:#880e4f;background:#fce4ec;border-color:#f48fb1}
        .sentence{margin-top:10px;padding-top:10px;border-top:1px dashed #f8bbd0;color:#ad1457;font-weight:700;font-size:.8rem;line-height:1.8}
        .summary-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px;padding:14px;background:rgba(255,255,255,.6);border-radius:16px;border:1px solid #f8bbd0}
        .summary-item{flex:1;min-width:70px;text-align:center;padding:8px;border-radius:12px}
        .summary-item .num{font-size:1.5rem;font-weight:900;color:#d63384}
        .summary-item .lbl{font-size:.72rem;color:#880e4f;font-weight:700}
        .business-breakdown{margin-top:14px;padding:14px;background:rgba(255,255,255,.6);border-radius:16px;border:1px solid #f8bbd0}
        .business-breakdown h3{color:#880e4f;font-size:.9rem;font-weight:900;margin-bottom:10px;text-align:center}
        .biz-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed #f8bbd0;font-size:.8rem}
        .biz-row:last-child{border-bottom:none}
        .biz-row .biz-name{color:#ad1457;font-weight:700;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .biz-row .biz-stats{display:flex;gap:8px}
        .biz-row .biz-stats span{font-size:.7rem;font-weight:800;padding:2px 8px;border-radius:10px}
        .user-badge{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.5);padding:10px 16px;border-radius:14px;margin-bottom:16px;border:1px solid #f8bbd0}
        .user-badge .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(45deg,#FF6B9D,#A178DF);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:1rem;flex-shrink:0}
        .user-badge .info{font-size:.82rem;color:#880e4f;font-weight:700;line-height:1.5}
        .user-badge .info span{display:block;opacity:.6;font-weight:400;font-size:.75rem}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:linear-gradient(45deg,#FF6B9D,#A178DF);color:#fff;padding:14px 28px;border-radius:50px;font-family:'Tajawal';font-weight:800;font-size:.95rem;box-shadow:0 8px 25px rgba(106,27,154,.3);z-index:9999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:90%;text-align:center}
        .toast.show{transform:translateX(-50%) translateY(0)}
        #resultsArea{margin-top:0}
        @media(max-width:500px){.field-row{flex-direction:column;gap:0}h1{font-size:3rem}.card{padding:26px 20px}.mode-btn{font-size:.72rem;padding:8px 4px}}
    </style>
</head>
<body>
<div class="bubble b-1"></div><div class="bubble b-2"></div><div class="bubble b-3"></div><div class="bubble b-4"></div>
<div class="toast" id="toast"></div>

<div class="page active" id="page1">
<div class="card">
    <h1>Bug Busters</h1>
    <p class="sub"> ادلع يا عميل ،و Bug Busters يحلل بالتفصيل!<div class="y2k-eye"><div class="y2k-pupil"></div><div class="y2k-eyelid"></div></div></p>
    <div class="form-group"><label><span class="req">*</span> اسم العميل</label><div class="input-wrap"><span class="icon">👤</span><input type="text" id="userName" placeholder="اكتب اسمك هنا"></div><div class="error-msg" id="nameErr">لازم تكتب اسمك الأول</div></div>
    <div class="form-group"><label><span class="req">*</span> المكان</label><div class="input-wrap"><span class="icon">📍</span><input type="text" id="userPlace" placeholder="مثال: المطعم، الفرع، المدينة"></div><div class="error-msg" id="placeErr">لازم تحدد المكان</div></div>
    <div class="field-row">
        <div class="form-group"><label><span class="req">*</span> رقم العميل</label><div class="input-wrap"><span class="icon">📱</span><input type="tel" id="userPhone" placeholder="01xxxxxxxxx" maxlength="11"></div><div class="error-msg" id="phoneErr">رقم التليفون مش مظبوط</div></div>
        <div class="form-group"><label>الايميل</label><div class="input-wrap"><span class="icon">✉️</span><input type="email" id="userEmail" placeholder="example@mail.com"></div><div class="error-msg" id="emailErr">الإيميل مش مظبوط</div></div>
    </div>
    <button class="main-btn" onclick="goToAnalysis()">التالي ←</button>
</div>
</div>

<div class="page hidden-left" id="page2">
<div class="card">
    <button class="back-btn" onclick="goBack()">← رجوع</button>
    <div class="user-badge"><div class="avatar" id="avatarLetter">م</div><div class="info"><div id="badgeName">محمد</div><span id="badgePlace">📍 المكان</span></div></div>
    <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('single',this)">ريفيو واحد</button>
        <button class="mode-btn" onclick="setMode('batch',this)">عدة ريفيوهات</button>
        <button class="mode-btn" onclick="setMode('dataset',this)">بيانات جاهزة</button>
    </div>
    <div id="manualArea">
        <label class="field-label">الريفيو</label>
        <textarea id="txt" rows="3" placeholder="مثال: الاكل وحش والخدمة ممتازه"></textarea>
        <div class="hint" id="hintText">اكتب ريفيو واحد </div>
        <label class="field-label">التقييم بالنجوم</label>
        <div class="star-rating" id="starRating"><span data-value="1">★</span><span data-value="2">★</span><span data-value="3">★</span><span data-value="4">★</span><span data-value="5">★</span></div>
        <div class="star-hint" id="starHint"></div>
    </div>
    <div class="dataset-controls" id="datasetControls">
        <label>اختار المكان</label>
        <select id="bizSelect"><option value="__all__">كل الأماكن (225 ريفيو)</option></select>
        <div class="dataset-count" id="datasetCount">225 ريفيو جاهز للتحليل</div>
    </div>
    <button class="main-btn" onclick="runAnalysis()">تحليل</button>
    <div id="resultsArea"></div>
</div>
</div>

// استخراج قائمة الأماكن الفريدة
const uniqueBiz=[...new Set(DS.map(d=>d.biz))].sort();
const bizSelect=document.getElementById('bizSelect');
uniqueBiz.forEach(b=>{
    let count=DS.filter(d=>d.biz===b).length;
    let opt=document.createElement('option');
    opt.value=b; opt.textContent=`${b} (${count} ريفيو)`;
    bizSelect.appendChild(opt);
});
bizSelect.addEventListener('change',function(){
    let v=this.value;
    let count=v==='__all__'?DS.length:DS.filter(d=>d.biz===v).length;
    document.getElementById('datasetCount').textContent=count+' ريفيو جاهز للتحليل';
});

// النجوم
const stars=document.querySelectorAll('#starRating span');
stars.forEach(s=>{
    s.addEventListener('mouseenter',function(){document.getElementById('starHint').textContent=starLabels[this.getAttribute('data-value')]});
    s.addEventListener('click',function(){
        selectedStars=parseInt(this.getAttribute('data-value'));
        stars.forEach(x=>x.classList.remove('active'));
        for(let i=0;i<selectedStars;i++)stars[i].classList.add('active');
        document.getElementById('starHint').textContent=starLabels[selectedStars];
    });
});

function validate(){
    let ok=true,n=document.getElementById('userName').value.trim(),p=document.getElementById('userPlace').value.trim(),ph=document.getElementById('userPhone').value.trim(),em=document.getElementById('userEmail').value.trim();
    if(!n){document.getElementById('userName').classList.add('error');document.getElementById('nameErr').classList.add('show');ok=false}
    if(!p){document.getElementById('userPlace').classList.add('error');document.getElementById('placeErr').classList.add('show');ok=false}
    if(!ph||!/^01[0-9]{9}$/.test(ph)){document.getElementById('userPhone').classList.add('error');document.getElementById('phoneErr').classList.add('show');ok=false}
    if(em&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){document.getElementById('userEmail').classList.add('error');document.getElementById('emailErr').classList.add('show');ok=false}
    return ok;
}

// NLP
const Asp={food:["اكل","طعم","فراخ","بيتزا","شاورما","كباب","فول","سندوتش","شيشه","مشروبات","حلويات","مندي","مكرونه","كنافه","سمك","جمبري","شوربه","رز","لحم","كفتة","فرخ","حمام","فتة","ملوخيه","طعميه","سندوتشات","بسكويت","وجبات","شوربة","بيتزا","عجاين","مناقيش","جبن","زنجير"],service:["خدم","ستاف","موظفين","وايتر","تعامل","كابتن","سواق","استقبال","دعم","نادل","سيرفس","ريسبشن","استاف"],price:["سعر","اسعار","غالي","رخيص","فلوس","مبالغ","تسعير"],ambiance:["مكان","جلس","ديكور","زحم","هادي","اجواء","اجوااء","فيو","قعدته"],cleanliness:["نظاف","نضيف","وسخ","قذر","عفن","غبار","دبان"],delivery:["توصيل","دليفر","مندوب","وصل","اوردر","دلفري"],app_experience:["تطبيق","ابلكيشن","برنامج","موقع"]};
const Pos=["حلو","ممتاز","جميل","تحفه","رائع","جيد","لذيذ","سريع","محترم","طازج","عالمي","محترمه","محترف","عسل","خدوم","راقي","رقي","بروفشنال","فنان","خطير","عالي","مميز","متميز","انضف","نضيف","خفيف"];
const Neg=["وحش","سيء","فاشل","زباله","تأخير","بارد","ناشف","قذر","وسخ","زفت","بايظ","سيئه","اسواء","مجلد","نية","سودا","زفره","يقرف","مخيبه","اهمال","استغلالي","كذابين","خرا","قرف"];
const aN={food:"الاكل",service:"الخدمة",price:"الاسعار",ambiance:"المكان",cleanliness:"النظافة",delivery:"التوصيل",app_experience:"التطبيق"};

function analyze(text,id,rating,extra){
    let c=text.replace(/[إأآا]/g,"ا").replace(/ة/g,"ه").replace(/ى/g,"ي");
    let asp={},list=[];
    for(let k in Asp){
        let found=false,ctx="";
        for(let w of Asp[k]){let i=c.indexOf(w);if(i!==-1){found=true;ctx=c.substring(Math.max(0,i-20),Math.min(c.length,i+w.length+20));break}}
        if(found){list.push(k);let s=0;for(let p of Pos)if(ctx.includes(p))s++;for(let n of Neg)if(ctx.includes(n))s--;if((ctx.includes("مش")||ctx.includes("ما"))&&s>0)s=-1;asp[k]=s>0?"positive":(s<0?"negative":"neutral")}
    }
    let r={review_id:id,review_text:text,star_rating:rating,aspects:list.length?list:["none"],aspect_sentiments:list.length?asp:{none:"neutral"}};
    if(extra)Object.assign(r,extra);
    return r;
}

function starsHTML(r){let h='<div class="review-stars-display">';for(let i=1;i<=5;i++)h+=i<=r?'★':'<span class="empty">★</span>';return h+'</div>'}

function renderCard(data,idx){
    let h=`<div class="review-card" style="animation-delay:${idx*0.05}s">`;
    h+=`<div class="review-header"><span class="review-num">#${data.review_id}</span>${starsHTML(data.star_rating)}</div>`;
    let meta=[];
    if(data.business_name)meta.push(data.business_name);
    if(data.business_category)meta.push(data.business_category);
    if(data.date)meta.push(data.date);
    if(data.platform)meta.push(data.platform);
    if(meta.length)h+=`<div class="review-meta">${meta.map(m=>`<span class="meta-tag">${m}</span>`).join('')}</div>`;
    h+=`<div class="review-text-preview">${data.review_text}</div><div>`;
    for(let a in data.aspect_sentiments){let s=data.aspect_sentiments[a],cl=s==='positive'?'pos':(s==='negative'?'neg':'neu');h+=`<span class="tag ${cl}">${aN[a]||a}: ${s}</span>`}
    h+=`</div>`;
    let sent=[];for(let a in data.aspect_sentiments){let s=data.aspect_sentiments[a],nm=aN[a]||a;sent.push(`${nm} ${s==='positive'?'إيجابي':(s==='negative'?'سلبي':'محايد')}`)}
    h+=`<div class="sentence">${sent.join(' · ')}</div></div>`;return h;
}

function renderSummary(results){
    let tP=0,tN=0,tNe=0,ac={};results.forEach(r=>{for(let a in r.aspect_sentiments){let s=r.aspect_sentiments[a];if(a==='none')continue;if(!ac[a])ac[a]={positive:0,negative:0,neutral:0};ac[a][s]++;if(s==='positive')tP++;else if(s==='negative')tN++;else tNe++}});
    let avg=(results.reduce((s,r)=>s+(r.star_rating||0),0)/results.length).toFixed(1);
    let h=`<div class="summary-bar">`;
    h+=`<div class="summary-item"><div class="num">${results.length}</div><div class="lbl">ريفيو</div></div>`;
    h+=`<div class="summary-item"><div class="num">${avg}</div><div class="lbl">متوسط النجوم</div></div>`;
    h+=`<div class="summary-item"><div class="num" style="color:#2e7d32">${tP}</div><div class="lbl">إيجابي</div></div>`;
    h+=`<div class="summary-item"><div class="num" style="color:#c62828">${tN}</div><div class="lbl">سلبي</div></div>`;
    h+=`<div class="summary-item"><div class="num" style="color:#880e4f">${tNe}</div><div class="lbl">محايد</div></div></div>`;
    return h;
}

function renderBizBreakdown(results){
    let bizMap={};
    results.forEach(r=>{
        if(!r.business_name)return;
        if(!bizMap[r.business_name])bizMap[r.business_name]={count:0,pos:0,neg:0,neu:0,cat:r.business_category||''};
        bizMap[r.business_name].count++;
        for(let a in r.aspect_sentiments){
            if(a==='none')continue;
            let s=r.aspect_sentiments[a];
            if(s==='positive')bizMap[r.business_name].pos++;
            else if(s==='negative')bizMap[r.business_name].neg++;
            else bizMap[r.business_name].neu++;
        }
    });
    let sorted=Object.entries(bizMap).sort((a,b)=>b[1].count-a[1].count);
    if(!sorted.length)return'';
    let h=`<div class="business-breakdown"><h3>توزيع الأماكن</h3>`;
    sorted.slice(0,15).forEach(([name,d])=>{
        h+=`<div class="biz-row"><span class="biz-name">${name}</span><div class="biz-stats">`;
        h+=`<span style="background:#f1f8e9;color:#2e7d32">+${d.pos}</span>`;
        h+=`<span style="background:#ffebee;color:#c62828">-${d.neg}</span>`;
        h+=`<span style="background:#fce4ec;color:#880e4f">=${d.neu}</span>`;
        h+=`<span style="background:#f3e5f5;color:#6a1b9a">${d.count} ر.</span>`;
        h+=`</div></div>`;
    });
    h+=`</div>`;return h;
}

function showToast(msg){let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

function dlJSON(data,name){let b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.style.display="none";document.body.appendChild(a);a.click();document.body.removeChild(a)}

function runAnalysis(){
    let results=[],isDataset=currentMode==='dataset';
    if(isDataset){
        let sel=document.getElementById('bizSelect').value;
        let filtered=sel==='__all__'?DS:DS.filter(d=>d.biz===sel);
        if(!filtered.length){showToast('مفيش ريفيوهات للأماكن دي');return}
        results=filtered.map(d=>analyze(d.text,d.id,d.stars,{business_name:d.biz,business_category:d.cat,date:d.date,platform:d.plat}));
    }else{
        let raw=document.getElementById('txt').value.trim();
        if(!raw){showToast('اكتب حاجة الأول يا حبيبي!');return}
        let reviews=currentMode==='single'?[raw]:raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
        if(!reviews.length){showToast('مفيش ريفيوهات فاضية دي!');return}
        results=reviews.map((r,i)=>analyze(r,i+1,selectedStars));
    }
    let area=document.getElementById('resultsArea'),html='';
    if(results.length>1){html+=renderSummary(results);if(isDataset)html+=renderBizBreakdown(results)}
    results.forEach((r,i)=>html+=renderCard(r,i));
    area.innerHTML=html;
    let output={customer:userData,reviews:results};
    let fn=isDataset?`dataset_${results.length}_reviews.json`:(results.length===1?'single_review.json':`${results.length}_reviews.json`);
    dlJSON(output,fn);
    let msg=results.length===1?'ريفيو واحد اتصلح!':`${results.length} ريفيو اتصلحوا!`;
    showToast(msg+' ↓ الملف نزل');
}
